<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta content="#0d0d10" name="theme-color" />
  <link href="/favicon.svg" rel="icon" type="image/svg+xml" />
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
  <title>404 — Quentin Macq</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload"
        as="style"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=Inter+Tight:ital,wght@0,300..700&family=JetBrains+Mono:wght@400..700&display=swap"
        onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=Inter+Tight:ital,wght@0,300..700&family=JetBrains+Mono:wght@400..700&display=swap"
    />
  </noscript>
  <style>
    :root {
      --ink: #0d0d10;
      --paper: #f5f1e8;
      --accent: #ff5b3a;
      --muted: rgba(245, 241, 232, 0.62);
      --faint: rgba(245, 241, 232, 0.38);
      --line: rgba(245, 241, 232, 0.12);
      --font-display: 'Fraunces', 'Iowan Old Style', 'Apple Garamond', Baskerville, serif;
      --font-body: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100dvh;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-body), sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(1.5rem, 4vw, 3rem);
      background:
        radial-gradient(120% 80% at 90% -10%, rgba(255, 91, 58, 0.07), transparent 60%),
        radial-gradient(60% 60% at 0% 110%, rgba(212, 165, 116, 0.05), transparent 60%);
    }

    .top {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-family: var(--font-mono), monospace;
      font-size: 0.6875rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .top__rule {
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .center {
      max-width: 64ch;
      margin: auto 0;
    }

    .eyebrow {
      display: inline-block;
      margin: 0 0 1.5rem;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-family: var(--font-mono), monospace;
      font-size: 0.6875rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .code {
      font-family: var(--font-display), serif;
      font-variation-settings: 'opsz' 144, 'SOFT' 60;
      font-weight: 350;
      font-style: italic;
      font-size: clamp(5rem, 14vw, 12rem);
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: var(--accent);
      margin: 0;
    }

    h1 {
      font-family: var(--font-display), serif;
      font-variation-settings: 'opsz' 144, 'SOFT' 60;
      font-weight: 350;
      font-size: clamp(2rem, 1.4rem + 3vw, 3.5rem);
      line-height: 1.05;
      letter-spacing: -0.025em;
      margin: 1rem 0 1.5rem;
    }

    p {
      max-width: 48ch;
      font-family: var(--font-display), serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.125rem, 1rem + 0.5vw, 1.375rem);
      line-height: 1.45;
      color: var(--muted);
      margin: 0 0 2.5rem;
    }

    a.back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 12px 22px;
      background: var(--accent);
      color: var(--ink);
      text-decoration: none;
      border-radius: 999px;
      font-family: var(--font-body), sans-serif;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: background 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    a.back:hover { background: #d6411e; }

    a.back svg { transition: transform 360ms cubic-bezier(0.16, 1, 0.3, 1); }
    a.back:hover svg { transform: translateX(3px); }

    .bottom {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-family: var(--font-mono), monospace;
      font-size: 0.6875rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--faint);
    }
  </style>
</head>
<body>
  <header class="top">
    <span>IDX 001 — ÉDITION 2026</span>
    <span class="top__rule"></span>
    <span>404</span>
  </header>

  <main class="center">
    <span class="eyebrow">Page introuvable</span>
    <p class="code">404.</p>
    <h1>Cette page n'existe pas ou n'existe plus.</h1>
    <p>Lien périmé, faute de frappe, ou contenu déplacé.</p>
    <a class="back" href="/">
      <span>Retour à l'accueil</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6" />
      </svg>
    </a>
  </main>

  <footer class="bottom">
    <span>Quentin Macq · Hauts-de-France</span>
    <span class="top__rule"></span>
  </footer>
</body>
</html>
