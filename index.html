<!doctype html>
<html lang="fr" class="theme-dark">
  <head>
    <meta charset="UTF-8" />
    <meta content="#0d0d10" name="theme-color" />
    <link href="/favicon.svg" rel="icon" type="image/svg+xml" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />

    <script>
      document.documentElement.classList.add('js')

      try {
        const stored = localStorage.getItem('theme')
        const light =
          stored === 'light' || (!stored && matchMedia('(prefers-color-scheme: light)').matches)
        document.documentElement.classList.toggle('theme-light', light)
        document.documentElement.classList.toggle('theme-dark', !light)

        if (light) {
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f5f1e8')
        }
      } catch (e) {}
    </script>

    <title>Quentin Macq — Développeur full-stack</title>

    <meta
      name="description"
      content="Quentin Macq — développeur full-stack avec une obsession pour la performance front et les nouveaux outils. Symfony, Nuxt, TypeScript. Hauts-de-France."
    />
